<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- Dragon Ink and Thread — seamless botanical scatter used as the page
       background. Transparent tile so it layers over the cream paper.
       Line-art sprigs / blooms / berries in the brand teal + honey, kept
       faint for readability. Motifs stay clear of the tile edges so the
       240x240 tile repeats seamlessly. -->
  <defs>
    <g id="sprig" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 24 C0 8 0 -6 0 -20"/>
      <path d="M0 4 C-10 0 -13 -8 -12 -17"/>
      <path d="M0 -4 C10 -8 13 -15 12 -24"/>
      <path d="M0 13 C-9 9 -12 3 -11 -4"/>
      <path d="M0 6 C9 2 12 -5 11 -13"/>
    </g>
    <g id="leaf" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0 C-8 -5 -8 -16 0 -21 C8 -16 8 -5 0 0 Z"/>
      <path d="M0 -3 L0 -18"/>
    </g>
    <g id="bloom" fill="none" stroke-linecap="round">
      <circle r="1.8"/>
      <path d="M0 -3.5 V-8 M0 3.5 V8 M-3.5 0 H-8 M3.5 0 H8 M-2.5 -2.5 L-5.6 -5.6 M2.5 -2.5 L5.6 -5.6 M-2.5 2.5 L-5.6 5.6 M2.5 2.5 L5.6 5.6"/>
    </g>
    <g id="berry" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="2.4"/>
      <circle cx="6" cy="3.5" r="2.4"/>
      <circle cx="-5" cy="4.5" r="2.4"/>
      <path d="M0 -2 L1 -9 M6 1.2 L3 -7 M-5 2.2 L-1 -7"/>
    </g>
  </defs>

  <g stroke="#4a9198" stroke-opacity="0.17" stroke-width="1.6">
    <use href="#sprig" transform="translate(42,52) rotate(-14)"/>
    <use href="#berry" transform="translate(120,34)"/>
    <use href="#leaf"  transform="translate(206,70) rotate(24)"/>
    <use href="#bloom" transform="translate(70,116)"/>
    <use href="#sprig" transform="translate(50,182) rotate(158)"/>
    <use href="#leaf"  transform="translate(150,150) rotate(-30)"/>
    <use href="#bloom" transform="translate(214,206)"/>
  </g>
  <g stroke="#d7a640" stroke-opacity="0.22" stroke-width="1.6">
    <use href="#bloom" transform="translate(186,140)"/>
    <use href="#berry" transform="translate(146,200)"/>
  </g>
</svg>
